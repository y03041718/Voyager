spring:
  application:
    name: voyager-demo
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/tripagent?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: zcjy
    password: 030409zcjy
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # Jackson配置
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 高德地图API配置
amap:
  key: e40d885910a08c8778e9e6414b882819
  base-url: https://restapi.amap.com/v3

# Qwen API配置
qwen:
  api-key: sk-cfeca3db851d477ebba55722f0a91521
  api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  model: qwen3-32b

# 跨域配置
cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# JWT配置
jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidation12345678901234567890
  expiration: 86400000  # 24小时 (毫秒)

# 文件上传配置
file:
  upload-dir: uploads

# 日志配置
logging:
  level:
    com.example.voyagerdemo: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

web:
    resources:
      static-locations: classpath:/pics/,classpath:/static/
mvc:
    static-path-pattern: /pics/**